name: cicd inventory-service

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
  
    steps:

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Java version
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Build artifact
        run: mvn package -DskipTests

      - name: Define tag
        id: vars
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT" 

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/inventory-service:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/inventory-service:{{ steps.vars.outputs.tag }}

      - name: Checkout gitops tools
        uses: actions/checkout@v7
        with:
          repository: erickfranca/manifests-repo
          token: ${{ secrets.MANIFESTS_REPO_PAT }}
          path: manifests-repo

      - name: Update helm chart
        run: | 
          cd manifests-repo
          sed -i "s/tag: .*/tag: \"${{ steps.vars.outputs.tag }}\"/" charts/inventory-service/values.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add charts/inventory-service/values.yaml
          git commit -m "deploy: atualiza imagem para ${{ steps.vars.outputs.tag }}"
          git push